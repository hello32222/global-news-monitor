name: Global Intelligence Monitor
on:
  schedule:
    - cron: '0 * * * *' # Ogni ora
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          
      - name: 📻 Scan Radio
        run: python radio_scanner.py
        
      - name: 🤖 AI Translation
        run: python radio_monitor.py
        
      - name: 📰 News Aggregator
        run: |
          # Se hai creato anche news_monitor.py, scommenta la riga sotto
          # python news_monitor.py 
          
     - name: 🚀 Salva e Pubblica i Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Aggiornamento Intelligence: $(date)" || echo "Nessuna modifica da salvare"
          git push origin main
