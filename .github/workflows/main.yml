name: Global Intelligence Monitor
on:
  schedule:
    - cron: '0 * * * *' # Ogni ora
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          
      - name: 📻 Scan Radio
        run: python radio_scanner.py
        
      - name: 🤖 AI Translation
        run: python radio_monitor.py
        
      - name: 📰 News Aggregator
        run: |
          # Se hai creato anche news_monitor.py, scommenta la riga sotto
          # python news_monitor.py 
          
      - name: 🚀 Push Results
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Intelligence-Bot"
          git add .
          git commit -m "New intel update" || exit 0
          git push
